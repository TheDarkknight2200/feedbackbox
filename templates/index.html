<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Boîte à messages anonymes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h2 class="mb-4">📝 Envoyer un message anonyme</h2>
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <div class="mb-3">
            <textarea name="message" class="form-control" placeholder="Écris ton message ici..." rows="5" required></textarea>
        </div>
        <div class="mb-3">
            <input type="text" name="code" class="form-control" placeholder="Ton code anonyme" required>
        </div>
        <button type="submit" class="btn btn-primary">Envoyer</button>
    </form>
</div>

<button class="btn btn-secondary position-fixed bottom-0 end-0 m-4" onclick="toggleMode()">🌗 Changer le thème</button>

<script>
    const body = document.body;
    const currentMode = localStorage.getItem("mode");

    if (currentMode === "dark") {
        body.classList.add("bg-dark", "text-white");
    }

    function toggleMode() {
        body.classList.toggle("bg-dark");
        body.classList.toggle("text-white");

        const mode = body.classList.contains("bg-dark") ? "dark" : "light";
        localStorage.setItem("mode", mode);
    }
</script>

</body>
</html>
