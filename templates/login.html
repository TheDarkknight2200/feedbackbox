<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feedback Box</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <div class="container my-4">
    <h1 class="text-center mb-4">Feedback Box</h1>

    <form method="POST" action="/">
      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name" required />
      </div>
      <div class="mb-3">
        <label for="message" class="form-label">Message</label>
        <textarea class="form-control" id="message" name="message" rows="4" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary w-100">Send Feedback</button>
    </form>

    <hr class="my-4" />

    <h2 class="mb-3">Recent Feedbacks</h2>
    <div>
      {% for fb in feedbacks %}
        <div class="card mb-2">
          <div class="card-body">
            <h5 class="card-title">{{ fb.name }}</h5>
            <p class="card-text">{{ fb.message }}</p>
            <small class="text-muted">{{ fb.timestamp.strftime('%Y-%m-%d %H:%M') }}</small>
          </div>
        </div>
      {% else %}
        <p>No feedback yet.</p>
      {% endfor %}
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
