<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="d-flex justify-content-center align-items-center bg-light text-dark" style="min-height: 100vh;">
  <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="mb-0">Admin Login</h3>
      <button class="btn btn-sm btn-outline-secondary" id="toggleTheme">🌙/☀️</button>
    </div>
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required />
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
  </div>
  
<script>
  const btn = document.getElementById("toggleTheme");
  const body = document.body;

  btn.addEventListener("click", () => {
    body.classList.toggle("bg-dark");
    body.classList.toggle("text-light");

    document.querySelectorAll(".card").forEach(card => {
      card.classList.toggle("bg-dark");
      card.classList.toggle("text-light");
      card.classList.toggle("border-light");
    });

    document.querySelectorAll("input, textarea").forEach(el => {
      el.classList.toggle("bg-dark");
      el.classList.toggle("text-light");
      el.classList.toggle("border-light");
    });
  });
</script>

</body>
</html>
